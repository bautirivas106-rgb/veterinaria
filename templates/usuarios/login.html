{% extends 'base.html' %}

{% block title %}Iniciar Sesión - VetGestión{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 bg-white p-8 rounded-xl shadow-sm border border-gray-200">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Bienvenido de nuevo</h1>
        <p class="text-gray-500">Ingresa tus credenciales para acceder</p>
    </div>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <div class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                <input type="text" name="username" id="username" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>
            
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900">Recordarme</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition shadow-sm">
                Entrar
            </button>
        </div>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500">
        ¿No tienes una cuenta? 
        <a href="/usuarios/registro/" class="font-medium text-indigo-600 hover:text-indigo-500">Regístrate aquí</a>
    </div>
</div>
{% endblock %}
